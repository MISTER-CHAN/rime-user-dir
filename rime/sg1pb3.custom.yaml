patch:
  switches/@2:
    options: [ noop, trad_graph, simplification ]
    states: [ '漢字', '漢字（傳承字形）', '汉字' ]
# switches/@next:
#   name: prediction
#   reset: 1
# 'engine/processors/@before 0': predictor
# 'engine/translators/@before 0': predict_translator
  'engine/filters/@before_0': simplifier@trad_graph
# 'engine/filters/@before 0': simplifier@simp_trad_graph
# predictor:
#   db: predict.db
#   max_candidates: 5
#   max_iterations: 1
  trad_graph:
    opencc_config: nto.json
    option_name: trad_graph
# simp_trad_graph:
#   opencc_config: tts.json
#   option_name: simp_trad_graph
  punctuator/full_shape/=:
    '<' : '《'
    '>' : '》'
    '[' : '「'
    '\' : '、'
    ']' : '」'
    '`': [ { __include: 'symbols_cantonese:/punctuator/full_shape/`' }, { __include: 'symbols:/punctuator/full_shape/~' } ]
    '{' : '『'
    '}' : '』'
  punctuator/half_shape/=:
    '<' : '《'
    '>' : '》'
    '[' : '「'
    '\' : '、'
    ']' : '」'
    '`/+': { __include: 'symbols_cantonese:/punctuator/half_shape/~' }
    '{' : '『'
    '}' : '』'