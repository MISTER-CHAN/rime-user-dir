# Trime default style settings
# encoding: utf-8

config_version: "3.0"
name: MISTER_CHAN #方案名稱
author: MISTER_CHAN #作者資訊

font: &font
  - 'NotoColorEmoji-Regular.ttf'
  - &font_m 'NotoSansMath-Regular.ttf'
  - &font_s 'NotoSansSymbols-Regular.ttf'
  - &font_s2 'NotoSansSymbols2-Regular.ttf'
  - &font_mc 'MISTER_CHAN_CJK.ttf'

style:
  auto_caps: false #自動句首大寫:true|false|ascii
  candidate_border: 0
  candidate_border_round: 0
  candidate_font: *font #候選字型
  candidate_padding: 12 #候選項內邊距
  candidate_spacing: 0.5 #候選間距
  candidate_text_size: 20 #候選字號
  candidate_view_height: 40 #候選區高度
  comment_font: *font #編碼提示字型
  comment_height: 0 #編碼提示區高度
  comment_on_top: false #編碼提示在上方或右側
  comment_position: right
  comment_text_size: 15 #編碼提示字號
  hanb_font: ['Jigmo2.ttf', 'Jigmo3.ttf'] #擴充字型
  horizontal_gap: 12 #鍵水平間距
  keyboard_padding: 0 #竖屏模式下，屏幕左右两侧与键盘的距离（曲面屏减少误触）
  keyboard_padding_left: 0 #竖屏屏模式下，左手键盘布局，屏幕左侧与键盘的距离
  keyboard_padding_right: 0 #竖屏屏模式下，左手键盘布局，屏幕右侧与键盘的距离
  keyboard_padding_bottom: 0 #竖屏模式下，屏幕下边缘与键盘的距离（避免误触发全面屏手势）
  keyboard_padding_land: 40 #横屏模式下，屏幕左右两侧与键盘的距离（避免横屏按键过度拉伸变形）
  keyboard_padding_land_bottom: 0 #横屏模式下，屏幕下侧与键盘的距离
  key_font: *font #鍵盤字型
  key_border: 0
  key_height: 50 #鍵高
  key_long_text_size: 24 #長標籤字號
  key_text_size: 24 #鍵字號
  key_text_offset_x: 0
  key_text_offset_y: 0
  key_symbol_offset_x: 0
  key_symbol_offset_y: 0
  key_hint_offset_x: 0
  key_hint_offset_y: 0
  key_press_offset_x: 0
  key_press_offset_y: 0
  key_width: 10.0 #鍵寬，佔螢幕寬的百分比
  label_text_size: 22 #標籤字號
  label_font: *font_mc #編標籤字型
  latin_font: *font_mc #西文字型
  keyboard_height: 240 #锁定键盘高度，避免切换时键盘高度变化而造成闪烁
  keyboard_height_land: 180 #锁定横屏下键盘高度，避免切换时键盘高度变化而造成闪烁
  popup_font: [*font_m, *font_s, *font_s2, *font_mc] #按键提示字体
  popup_width: 40 #按键提示宽度
  popup_height: 50 #按键提示高度
  popup_bottom_margin: 50 #按键提示底边距
  popup_key_height: 50 #按键提示内键高度
  popup_text_size: 24 #按键提示字号
  proximity_correction: true #按鍵糾錯
  reset_ascii_mode: false #顯示鍵盤時重置爲中文狀態
  round_corner: 0 #按鍵圓角半徑
  shadow_radius: 0.0 #按鍵陰影半徑
  symbol_font: [*font_m, *font_s, *font_s2, *font_mc] #符號字型
  symbol_text_size: 10 #符號字號
  text_font: *font_mc #編碼字型
  vertical_correction: 0
  vertical_gap: 12 #鍵盤行距
# background_folder: #背景图保存在background目录下的哪个子目录
  enter_label_mode: 3 #是否使用App提供的ActionLabel内容作为Enter键的文本（由于多数App没有适配ActionLable，实际影响不大）。0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels: # 定义Enter键的文本
    go: 'ic@arrow-right'
    done: 'ic@check'
    next: 'ic@keyboard-tab'
    pre: 'ic@keyboard-tab-reverse'
    search: 'ic@magnify'
    send: 'ic@send'
    default: 'ic@keyboard-return' # 定义默认Enter键的文本

preedit: # 预编辑文本视图参数
  horizontal_padding: 8 # 横向内边距（整数）
  alpha: 0.8 # 透明度（0-1，浮点）
  top_end_radius: 0 # 末上端圆角（浮点）
  foreground: # 前景样式
    font_size: 16 # 预编辑字体大小（浮点）

window: # 候选窗口（悬浮窗）参数
  insets: # 窗口内边距
    vertical: 4 # 纵向内边距（整数）
    horizontal: 4 # 横向内边距（整数）
  item_padding: # 候选项内边距
    vertical: 0 # 纵向内边距（整数）
    horizontal: 4 # 横向内边距（整数）
  min_width: 0 # 最小宽度（整数）
  corner_radius: 0 # 圆角半径（浮点）
  alpha: 1 # 透明度（0-1，浮点）
  foreground: # 前景样式
    label_font_size: 20 # 序号字体大小（浮点）
    text_font_size: 20 # 文字字体大小（浮点）
    comment_font_size: 16 # 注释字体大小（浮点）

# 最好保留一项，防止其他主题使用 __include 时无法加载
#fallback_colors:
# candidate_text_color: text_color
# 以下值是程序内置的，你也可以在这里自定义，这会覆盖默认值
