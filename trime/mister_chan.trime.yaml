tool_bar:
  button_spacing: 5 # 按钮间距
  button_font: *font # 按钮字体
  primary_button: # 左侧固定主按钮配置
#   size: [120, 24] # 视图控件宽高，非前景样式宽高
    background: &background # 背景样式设置
#     type: rectangle # 高亮形状 (可选值: circle|rectangle)
      corner_radius: 0 # 圆角半径
#     normal: 0x00 # 正常状态背景颜色
#     highlight: hilited_candidate_back_color # 高亮状态背景色
      vertical_inset: 0 # 垂直方向内缩量
#     horizontal_inset: 0 # 水平方向内缩量
    foreground: # 前景内容设置
      style: "ㄓ" # 内置质感设计图标样式（以ic@开头）
#     normal: candidate_text_color # 正常状态前景色 (本地图片不允许着色)
#     highlight: # 高亮状态前景色
      font_size: 20
#     padding: 0 # 前景内容与背景边界的内边距
    action: menu_keyboard # 按钮点击事件
  buttons:
    - background: *background
      foreground:
        style: "ic@chevron_down"
        font_size: 20
      action: Hide
    - background: *background
      foreground:
        style: "ic@palette"
        font_size: 20
      action: Color_settings
    - background: *background
      foreground:
        option_styles: ["。", "．"]
        font_size: 20
      action: Punct_switch
    - background: *background
      foreground:
        option_styles: ["ic@brightness_2", "ic@brightness_1"]
        font_size: 20
      action: Zenkaku_Hankaku
    - background: *background
      foreground:
        option_styles: ["中", "Ａ"] # 样式也可以为表，将根据 action 的 toggle 决定
        font_size: 20 # 按钮字体大小
      action: Mode_switch
    - background: *background
      foreground:
        style: "ic@content-paste"
        font_size: 20
      action: paste
    - background: *background
      foreground:
        style: "ic@undo"
        font_size: 20
      action: undo

