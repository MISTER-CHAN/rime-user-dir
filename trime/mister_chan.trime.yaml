    return_key_back_color: 0x99BBFF
    return_key_text_color: 0x222222
    shadow_color: 0x000000
    text_back_color: 0x222222
    text_color: 0xFFFFFF

liquid_keyboard:
  # 目前只能直接写参数，不支持变量或者fallback机制。
  # 缺少参数时，自动从style中加载参数。除非需要指定liquid_keyboard使用与主键盘不同的背景色、背景图，否则不应设置被注释掉的参数。
  author: 'MISTER_CHAN'
  row: 0 # 每屏最多显示多少行按键
  row_land: 0 # 横屏每屏最多显示多少行按键
  key_height: 39 # 按键高度
  key_height_land: 39 # 横屏模式按键高度
  single_width: 39 # single类型的按键宽度
  vertical_gap: 0 # 纵向按键间隙
  margin_x: 1 # 左右按键间隙的1/2
  fixed_key_bar: # 固定按键条
    position: bottom # 摆放位置（在滚动区域的……） top|bottom|left|right
    keys: [liquid_keyboard_key_exit, liquid_keyboard_key_space, liquid_keyboard_key_backspace, liquid_keyboard_key_return] # 按键（显示名称为对应的label，不能放太多）
  keyboards: [bl_l1s, faces, hands, gestures]
  bl_l1s: # Basic Latin and Latin-1 Supplement
    name: ' !§ '
    type: SINGLE
    keys: [' ', '!', '"', '#', '$', '%', '&', "'", '(', ')', '*', '+', ',', '-', '.', '/', ':', ';', '<', '=', '>', '?', '@', '[', '\', ']', '^', '_', '`', '{', '|', '}', '~', ' ', '¡', '¢', '£', '¤', '¥', '¦', '§', '¨', '©', 'ª', '«', '¬', '­', '®', '¯', '°', '±', '²', '³', '´', 'µ', '¶', '·', '¸', '¹', 'º', '»', '¼', '½', '¾', '¿', '×', '÷']
  candidate:
    name: '▼'
    type: CANDIDATE
  clipboard:
    name: '📋'
    type: CLIPBOARD
  collection:
    name: '⭐'
    type: COLLECTION
  draft:
    name: '🖆'
    type: DRAFT
  faces:
    name: '🙂'
    type: SINGLE
    keys: ['☹', '☺', '☻', '👿', '😀', '😁', '😂', '😃', '😄', '😅', '😆', '😇', '😈', '😉', '😊', '😋', '😌', '😍', '😎', '😏', '😐', '😑', '😒', '😓', '😔', '😕', '😖', '😗', '😘', '😙', '😚', '😛', '😜', '😝', '😞', '😟', '😠', '😡', '😢', '😣', '😤', '😥', '😦', '😧', '😨', '😩', '😪', '😫', '😬', '😭', '😮', '😮‍💨', '😯', '😰', '😱', '😲', '😳', '😴', '😵', '😵‍💫', '😶', '😶‍🌫', '😷', '🙁', '🙂', '🙂‍↔', '🙂‍↕', '🙃', '🙄', '🤐', '🤑', '🤒', '🤓', '🤔', '🤕', '🤗', '🤠', '🤡', '🤢', '🤣', '🤤', '🤥', '🤧', '🤨', '🤩', '🤪', '🤫', '🤬', '🤭', '🤮', '🤯', '🥰', '🥱', '🥲', '🥳', '🥴', '🥵', '🥶', '🥸', '🥹', '🥺', '🧐', '🫠', '🫡', '🫢', '🫣', '🫤', '🫥', '🫨', '🫩', '🫪', '︎', '️']
  gestures:
    name: '🙋'
    type: SINGLE
    keys: ['💁', '🙅', '🙆', '🙇', '🙋', '🙍', '🙎', '🤦', '🤷', '🧏', '🏻', '🏼', '🏽', '🏾', '🏿', '‍♂', '‍♀']
  hands:
    name: '🖐'
    type: SINGLE
    keys: '☜☝☞☟✊✋✌👆👇👈👉👊👋👌👍👎👏👐💪🖐🖑🖒🖓🖕🖖🙌🙏🤌🤏🤘🤙🤚🤛🤜🤝🤞🤟🤲🫰🫱🫲🫳🫴🫵🫶🫷🫸🏻🏼🏽🏾🏿︎️'

preset_keys:
  # 安卓
  BRIGHTNESS_DOWN: {label: 亮度-, send: BRIGHTNESS_DOWN}
  BRIGHTNESS_UP: {label: 亮度+, send: BRIGHTNESS_UP}
  CALCULATOR: {label: 計算機, send: CALCULATOR}
  CALENDAR: {label: 日曆, send: CALENDAR}
  CONTACTS: {label: 電話簿, send: CONTACTS}
  ENVELOPE: {label: 信箱, send: ENVELOPE}
  EXPLORER: {label: 瀏覽器, send: EXPLORER}
  MUSIC: {label: 音樂, send: MUSIC}
  POWER: {label: 電源, send: POWER}
  SEARCH: {label: 搜尋, send: Find}
  SLEEP: {label: 休眠, send: SLEEP}
  VOICE_ASSIST: {label: 語音, send: VOICE_ASSIST}
  VOLUME_DOWN: {label: 音量-, send: VOLUME_DOWN}
  VOLUME_UP: {label: 音量+, send: VOLUME_UP}
  VOLUME_MUTE: {label: 靜音, send: VOLUME_MUTE}
  # 編輯
  Shift_L: {label: 'ic@apple-keyboard-shift', functional: true, send: Shift_L, shift_lock: click}
  Shift_L_: {label: 'ic@apple-keyboard-shift', functional: false, slide_cursor: true, send: Shift_L, shift_lock: click}
  Shift_L_Long: {label: 'ic@apple-keyboard-shift', functional: true, send: Shift_L, shift_lock: long}
  Shift_R: {label: 'ic@apple-keyboard-shift', functional: true, send: Shift_R, shift_lock: click}
  Control_L: {label: '⎈', functional: true, send: Control_L, shift_lock: click}
  Control_R: {label: '⎈', functional: true, send: Control_R, shift_lock: click}
  Alt_L: {label: '⎇', functional: true, send: Alt_L, shift_lock: click}
  Alt_R: {label: '⎇', functional: true, send: Alt_R, shift_lock: click}
  Meta_L: {label: '◆', functional: true, send: Meta_L, shift_lock: click}
  Meta_R: {label: '◆', functional: true, send: Meta_R, shift_lock: click}
  Return: {label: enter_labels, preview: 'ic@keyboard-return', functional: true, send: Return, description: 回车}
  Return_: {label: '↵', functional: true, send: Return}
  Hide: {label: 隱藏, send: BACK}
  BackSpace: {label: 'ic@backspace-outline', repeatable: true, functional: true, slide_delete: true, send: BackSpace, description: 删除}
  space: {preview: 'ic@keyboard-space', repeatable: false, functional: false, slide_cursor: true, send: space}
  space_: {preview: 'ic@keyboard-space', repeatable: true, functional: false, slide_cursor: true, send: space}
  Escape: {label: '⎋', send: Escape}
  Retype: {label: 'ic@close-box-outline', send: Escape}
  Home: {label: '⇱', functional: false, send: Home}
  Insert: {label: '⎀', functional: false, send: Insert}
  Delete: {label: '␥', repeatable: true, functional: true, send: Delete, description: 删除}
  End: {label: '⇲', functional: false, send: End}
  Page_Up: {label: '⎗', functional: false, send: Page_Up}
  Page_Down: {label: '⎘', functional: false, send: Page_Down}
  Left: {label: 'ic@arrow-left', repeatable: true, functional: false, send: Left, description: 左}
  Down: {label: 'ic@arrow-down', repeatable: true, functional: false, send: Down, description: 下}
  Up: {label: 'ic@arrow-up', repeatable: true, functional: false, send: Up, description: 上}
  Right: {label: 'ic@arrow-right', repeatable: true, functional: false, send: Right, description: 右}
  select_all: {label: 'ic@select-all', functional: true, send: Control+a}
  Clear: {label: 清空, text: "{Control+a}{BackSpace}"} #全選並刪除
  cut: {label: 'ic@content-cut', functional: true, send: Control+x}
  cut_all: {label: 全挪, text: "{Control+a}{Control+x}"} #全選並剪切
  copy: {label: 'ic@content-copy', functional: true, send: Control+c}
  copy_all: {label: 全謄, text: "{Control+a}{Control+c}"} #全選並複製
  paste: {label: 'ic@content-paste', functional: true, send: Control+v}
  paste_text: {label: 貼上文本, send: Control+Shift+Alt+v} #>=Android 6.0
  share_text: {label: 分享文本, send: Control+Alt+s} #>=Android 6.0
  redo: {label: 'ic@redo', functional: true, send: Control+y} #>=Android 6.0
  undo: {label: 'ic@undo', functional: true, send: Control+z} #>=Android 6.0
  _5_: {functional: false, slide_cursor: true, send: _5}
  Tab: {label: 'ic@keyboard-tab', functional: true, send: Tab}
  Sys_Req: {label: '⎙', functional: false, send: Sys_Req}
  Pause: {label: "⎉", functional: false, send: Pause}
  KP_Enter: {label: '⎆', send: KP_Enter}
  liquid_keyboard_key_exit: {label: '         🡨 ', functional: true, send: function, command: liquid_keyboard, option: "-1"}
  liquid_keyboard_key_space: {label: '        ', repeatable: true, send: space}
  liquid_keyboard_key_backspace: {label: ' ⌫ ', repeatable: true, functional: true, send: BackSpace}
  liquid_keyboard_key_return: {label: ' ↵         ', functional: true, send: Return}
  # rime組合鍵
# F4: {label: 方案選單, send: F4}
  BackToPreviousSyllable: {label: 刪音節, send: Control+BackSpace}
  CommitRawInput: {label: 編碼, send: Control+Return}
  CommitScriptText: {label: 編碼, send: Shift+Return}
  CommitComment: {label: 編碼, send: Control+Shift+Return}
  DeleteCandidate: {label: 刪詞, send: Control+Delete}
  Del1stChar: {text: '{space}{Left}{Delete}'}
  Del2ndChar: {text: '{space}{Left}{Left}{Delete}{Right}'}
  2nd: {label: ͢2, text: '{Right}{space}'}
  3rd: {label: ͢3, text: '{Right}{Right}{space}'}
